version: 2
updates: 
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types: 
          - "minor"
          - "patch"
      sec-minor-and-patch:
        applies-to: security-updates
        update-types: 
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
